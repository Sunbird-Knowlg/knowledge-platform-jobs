include "base-test.conf"

job {
  env = "sunbirddev"
}

kafka {
  input.topic = "sunbirddev.learning.job.request"
  groupId = "sunbirddev-asset-enrichment-group"
  video_stream.topic = "sunbirddev.content.postpublish.request"
}

task {
  consumer.parallelism = 1
  router.parallelism = 1
  videoEnrichment.parallelism = 1
  imageEnrichment.parallelism = 1
}

content {
  stream {
    enabled = true
    mimeType = ["video/mp4", "video/webm"]
  }
  youtube {
    applicationName = "fetch-youtube-license"
    regexPattern = ["\\?vi?=([^&]*)", "watch\\?.*v=([^&]*)", "(?:embed|vi?)/([^/?]*)", "^([A-Za-z0-9\\-\\_]*)"]
  }
  upload.context.driven = true
}

thumbnail.max {
  sample = 5
  size.pixel = 150
}

schema {
  base_path = "https://raw.githubusercontent.com/Sunbird-Knowlg/knowledge-platform/master/schemas/"
  supportedVersion = {"itemset": "2.0"}
}

blob {
  input {
    contentImagePath = "https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png"
    contentVideoPath = "https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png"
  }
}

cloudstorage.metadata.replace_absolute_path=true
cloudstorage.relative_path_prefix= "CONTENT_STORAGE_BASE_PATH"
cloudstorage.read_base_path="https://test-container.blob.core.windows.net"
cloudstorage.write_base_path="https://test-container.blob.core.windows.net"
cloudstorage.metadata.list=["appIcon","posterImage","artifactUrl","downloadUrl","variants","previewUrl","pdfUrl", "streamingUrl", "toc_url"]
cloud_storage_type="azure"
cloud_storage_key="dGVzdC1rZXk="
cloud_storage_secret="test-secret"
cloud_storage_container="test-container"

content_youtube_apikey="test-api-key"
