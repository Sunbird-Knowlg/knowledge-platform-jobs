include "base-config.conf"

job {
  env = "sunbirddev"
}

kafka {
  input.topic = "sunbirddev.learning.job.request"
  post_publish.topic = "sunbirddev.content.postpublish.request"
  groupId = "local-questionset-publish-group"
}

task {
  consumer.parallelism = 1
  parallelism = 1
  router.parallelism = 1
}

question {
  keyspace = "dev_question_store"
  table = "question_data"
}

questionset {
  keyspace = "dev_hierarchy_store"
  table = "questionset_hierarchy"
}

janusgraph {
  route = "localhost:8182"
  graph = "domain"
}

cloud_storage_type="azure"
cloud_storage_key="dGVzdC1rZXk="
cloud_storage_secret="test-secret"
cloud_storage_container="test-container"

schema {
  basePath = "https://raw.githubusercontent.com/Sunbird-Knowlg/knowledge-platform/master/schemas/"
  supportedVersion = {"itemset": "2.0"}
}

blob {
  input {
    contentImagePath = "https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png"
  }
}
